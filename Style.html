<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --blue:        #1a73e8;
    --blue-hover:  #1557b0;
    --blue-light:  #e8f0fe;
    --green:       #137333;
    --green-hover: #0d5a28;
    --green-light: #e6f4ea;
    --text-primary:   #3c4043;
    --text-secondary: #5f6368;
    --border:      #dadce0;
    --bg-light:    #f8f9fa;
    --error:       #c5221f;
    --error-bg:    #fce8e6;
  }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    background: linear-gradient(135deg, #f0f4ff 0%, #f8f9fa 100%);
    min-height: 100vh;
    padding: 2rem 0 3rem;
  }

  /* ── Brand ── */
  .brand-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .brand-logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--blue), #4285f4);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 1.4rem;
    box-shadow: 0 4px 12px rgba(26,115,232,0.3);
  }
  .brand-title {
    font-size: 1.2rem; font-weight: 700;
    color: var(--text-primary); margin: 0;
  }

  /* ── Tab Navigation ── */
  .tab-nav {
    display: flex;
    background: white;
    border-radius: 12px 12px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    overflow: hidden;
  }
  .tab-btn {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 20px;
    font-size: 0.92rem; font-weight: 500;
    border: none; background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
    border-bottom: 3px solid transparent;
  }
  .tab-btn:hover { background: var(--bg-light); color: var(--text-primary); }
  .tab-btn.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
    background: white;
    font-weight: 600;
  }
  .tab-btn:last-child.active { color: var(--green); border-bottom-color: var(--green); }

  /* ── Card ── */
  .app-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 0 0 12px 12px;
    box-shadow: 0 2px 12px rgba(60,64,67,0.08);
  }
  .app-card-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg-light);
  }
  .app-card-title { font-size: 1rem; font-weight: 600; margin: 0; }
  .app-card-desc  { font-size: 0.8rem; color: var(--text-secondary); margin: 2px 0 0; }
  .app-card-body  { padding: 1.75rem 1.5rem; }

  /* Feature Badge */
  .feature-badge {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.8rem; flex-shrink: 0;
  }
  .badge-blue  { background: var(--blue-light);  color: var(--blue);  }
  .badge-green { background: var(--green-light); color: var(--green); }

  /* ── Steps Row ── */
  .steps-row {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    background: var(--bg-light);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .step-item { display: flex; align-items: center; gap: 8px; flex: 1; }
  .step-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--blue); color: white;
    font-size: 0.75rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .step-num.step-green { background: var(--green); }
  .step-text { font-size: 0.78rem; font-weight: 500; line-height: 1.3; }
  .step-text span { font-weight: 400; color: var(--text-secondary); }
  .step-arrow { color: var(--text-secondary); font-size: 1rem; flex-shrink: 0; }

  /* ── Upload Zone ── */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 2.5rem 2rem;
    text-align: center;
    background: var(--bg-light);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--blue);
    background: var(--blue-light);
  }
  .upload-icon { color: var(--blue); margin-bottom: 0.75rem; }
  .upload-text { font-weight: 500; margin-bottom: 4px; }
  .upload-subtext { font-size: 0.82rem; color: var(--text-secondary); }
  .file-input {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0; cursor: pointer;
  }

  /* File Badge */
  .file-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--blue-light); color: var(--blue);
    padding: 5px 14px; border-radius: 20px;
    font-size: 0.88rem; font-weight: 500;
    border: 1px solid rgba(26,115,232,0.2);
  }
  .file-badge-remove { cursor: pointer; font-weight: bold; color: var(--text-secondary); }
  .file-badge-remove:hover { color: var(--error); }

  /* ── Info Box ── */
  .info-box {
    display: flex; gap: 10px; align-items: flex-start;
    background: #fff8e1; border: 1px solid #ffe082;
    border-radius: 8px; padding: 12px 14px;
    font-size: 0.84rem; color: #5d4037;
  }
  .info-box code {
    background: rgba(0,0,0,0.06); padding: 1px 4px;
    border-radius: 3px; font-size: 0.82rem;
  }

  /* ── Buttons ── */
  .btn-primary-hrm {
    background: var(--blue); color: white;
    border: none; padding: 11px 24px;
    border-radius: 8px; font-weight: 600; font-size: 0.95rem;
    transition: all 0.2s; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-primary-hrm:hover:not(:disabled) {
    background: var(--blue-hover);
    box-shadow: 0 4px 12px rgba(26,115,232,0.3);
    transform: translateY(-1px);
  }
  .btn-primary-hrm:disabled { background: #ccc; cursor: not-allowed; transform: none; }

  .btn-success-hrm {
    background: var(--green); color: white;
    border: none; padding: 11px 24px;
    border-radius: 8px; font-weight: 600; font-size: 0.95rem;
    transition: all 0.2s; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-success-hrm:hover:not(:disabled) {
    background: var(--green-hover);
    box-shadow: 0 4px 12px rgba(19,115,51,0.3);
    transform: translateY(-1px);
  }
  .btn-success-hrm:disabled { background: #ccc; cursor: not-allowed; transform: none; }

  /* ── Progress ── */
  .status-container { margin-top: 1.25rem; display: none; }
  .progress-track {
    height: 6px; border-radius: 3px;
    background: var(--border); overflow: hidden; margin-bottom: 8px;
  }
  .progress-fill {
    background: var(--blue); width: 0%; height: 100%;
    border-radius: 3px; transition: width 0.4s ease;
  }
  .progress-fill-green { background: var(--green); }
  .status-text { font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); }

  /* ── Result Box ── */
  .result-box { margin-top: 1.25rem; padding: 1rem 1.25rem; border-radius: 8px; display: none; }
  .result-success { background: var(--green-light); border: 1px solid rgba(19,115,51,0.2); color: var(--green); }
  .result-error   { background: var(--error-bg); border: 1px solid rgba(197,34,31,0.2); color: var(--error); }
  .result-title   { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .result-links   { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .result-link-item {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--blue); text-decoration: none;
    font-size: 0.9rem; font-weight: 500;
  }
  .result-link-item:hover { text-decoration: underline; }
</style>
