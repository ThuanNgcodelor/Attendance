<style>
  /* Import font Inter từ Google Fonts để tạo vẻ hiện đại */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --google-blue: #1a73e8;
    --google-blue-hover: #1557b0;
    --google-blue-light: #e8f0fe;
    --text-primary: #3c4043;
    --text-secondary: #5f6368;
    --border-color: #dadce0;
    --bg-light: #f8f9fa;
    --success-color: #137333;
    --success-bg: #e6f4ea;
    --error-color: #c5221f;
    --error-bg: #fce8e6;
  }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    background-color: #ffffff;
    padding-top: 2rem;
    padding-bottom: 3rem;
  }

  /* Header Brand */
  .brand-container {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }

  .brand-logo {
    width: 40px;
    height: 40px;
    background-color: var(--google-blue);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    font-size: 1.5rem;
    box-shadow: 0 2px 4px rgba(26, 115, 232, 0.2);
  }

  .brand-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
  }

  /* Main Card Container */
  .app-card {
    border: 1px solid var(--border-color);
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(60, 64, 67, 0.1), 0 4px 8px rgba(60, 64, 67, 0.05);
    background-color: white;
    transition: box-shadow 0.3s ease;
    overflow: hidden;
  }

  .app-card-header {
    border-bottom: 1px solid var(--border-color);
    background-color: var(--bg-light);
    padding: 1.25rem 1.5rem;
  }

  .app-card-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0;
    color: var(--text-primary);
  }

  .app-card-body {
    padding: 2rem 1.5rem;
  }

  /* Drag and Drop Zone */
  .upload-zone {
    border: 2px dashed #ccc;
    border-radius: 8px;
    padding: 3rem 2rem;
    text-align: center;
    background-color: var(--bg-light);
    cursor: pointer;
    transition: all 0.2s ease-in-out;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--google-blue);
    background-color: var(--google-blue-light);
  }

  .upload-icon {
    font-size: 3rem;
    color: var(--google-blue);
    margin-bottom: 1rem;
  }

  .upload-text {
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
  }

  .upload-subtext {
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .file-input {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  /* Selected File Badge */
  .file-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background-color: var(--google-blue-light);
    color: var(--google-blue);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 500;
    margin-top: 1rem;
    border: 1px solid rgba(26, 115, 232, 0.2);
  }

  .file-badge-remove {
    cursor: pointer;
    font-weight: bold;
    color: var(--text-secondary);
  }

  .file-badge-remove:hover {
    color: var(--error-color);
  }

  /* Buttons */
  .btn-google {
    background-color: var(--google-blue);
    color: white;
    font-weight: 500;
    border: none;
    padding: 8px 24px;
    border-radius: 4px;
    transition: background-color 0.2s ease;
  }

  .btn-google:hover:not(:disabled) {
    background-color: var(--google-blue-hover);
    color: white;
  }

  .btn-google:disabled {
    background-color: #ccc;
    cursor: not-allowed;
  }

  /* Progress State */
  .status-container {
    margin-top: 1.5rem;
    display: none;
  }

  .progress {
    height: 6px;
    border-radius: 3px;
    background-color: var(--border-color);
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .progress-bar-animated-google {
    background-color: var(--google-blue);
    width: 0%;
    height: 100%;
    transition: width 0.4s ease;
  }

  .status-text {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-secondary);
  }

  /* Results Card */
  .result-box {
    margin-top: 1.5rem;
    padding: 1rem;
    border-radius: 8px;
    display: none;
  }

  .result-success {
    background-color: var(--success-bg);
    border: 1px solid rgba(19, 115, 51, 0.2);
    color: var(--success-color);
  }

  .result-error {
    background-color: var(--error-bg);
    border: 1px solid rgba(197, 34, 31, 0.2);
    color: var(--error-color);
  }

  .result-title {
    font-weight: 600;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-links {
    margin-top: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .result-link-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--google-blue);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
  }

  .result-link-item:hover {
    text-decoration: underline;
  }
</style>
