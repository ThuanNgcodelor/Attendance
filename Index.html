<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>HRM Attendance System</title>
  <!-- Nhúng Bootstrap 5.3 qua CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">

        <!-- Logo & Brand Header -->
        <div class="brand-container justify-content-center justify-content-sm-start">
          <div class="brand-logo">A</div>
          <div>
            <h1 class="brand-title">HRM Attendance System</h1>
            <span class="text-muted small">Hệ thống xử lý chấm công tự động</span>
          </div>
        </div>

        <!-- Main App Box -->
        <div class="app-card">
          <div class="app-card-header">
            <h2 class="app-card-title">Tải lên dữ liệu chấm công</h2>
          </div>
          <div class="app-card-body">

            <!-- Drag and Drop Box -->
            <div class="upload-zone" id="uploadZone">
              <div class="upload-icon">
                <svg width="48" height="48" fill="currentColor" class="bi bi-cloud-arrow-up" viewBox="0 0 16 16">
                  <path fill-rule="evenodd"
                    d="M7.646 5.146a.5.5 0 0 1 .708 0l2 2a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708l2-2z" />
                  <path
                    d="M4.406 3.342A5.53 5.53 0 0 1 8 2c2.69 0 4.923 2 5.166 4.579C14.758 6.804 16 8.137 16 9.773 16 11.569 14.502 13 12.687 13H3.781C1.708 13 0 11.366 0 9.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383zm.653.757c-.757.653-1.153 1.44-1.153 2.056v.548l-.548.064C2.121 6.9 1 8.006 1 9.318 1 10.773 2.227 12 3.781 12h8.906C13.98 12 15 11.02 15 9.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 4.825 10.328 3 8 3a4.53 4.53 0 0 0-2.941 1.1z" />
                </svg>
              </div>
              <div class="upload-text">Kéo thả file Excel vào đây</div>
              <div class="upload-subtext">hoặc nhấn để chọn file từ máy tính</div>
              <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xlsm,.xls">
            </div>

            <!-- Selected File Badge -->
            <div id="selectedFileContainer" class="text-center d-none">
              <div class="file-badge">
                <span id="selectedFileName">filename.xlsx</span>
                <span class="file-badge-remove" onclick="removeSelectedFile()">&times;</span>
              </div>
            </div>

            <!-- Action Button -->
            <div class="text-center mt-4">
              <button type="button" class="btn btn-google px-4 w-100" id="btnProcess" disabled onclick="processFile()">
                Bắt đầu xử lý dữ liệu
              </button>
            </div>

            <!-- Progress Indicator -->
            <div class="status-container" id="statusContainer">
              <div class="progress">
                <div class="progress-bar-animated-google" id="progressBar" role="progressbar"></div>
              </div>
              <div class="status-text text-center" id="statusText">Đang chuẩn bị...</div>
            </div>

            <!-- Action Results / Error Messages -->
            <div class="result-box" id="resultBox">
              <div class="result-title" id="resultTitle">
                Kết Quả Xử Lý
              </div>
              <div class="result-links" id="resultLinks">
                <!-- Links will be dynamically populated here -->
              </div>
            </div>

          </div>
        </div>

        <!-- Footer Info -->
        <div class="text-center mt-4 text-muted small">
          Phát triển bởi Nguyễn Trung Thuận (David Nguyen) © 2026
        </div>
      </div>
    </div>
  </div>

  <!-- Nhúng Client Script từ Script.html -->
  <?!= include('Script'); ?>
</body>

</html>
