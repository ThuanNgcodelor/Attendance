<script>
  // ─── State ───────────────────────────────────────────────────────────────
  let attendanceFiles = [];

  // ─── Utility: Promisify google.script.run ───────────────────────────────
  function runGoogleScript(funcName, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
      [funcName](...args);
    });
  }

  function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = () => reject(new Error("Lỗi đọc file: " + file.name));
      reader.readAsDataURL(file);
    });
  }

  function formatBytes(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024, dm = 2, sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
  }

  // ─── Tab Switching ────────────────────────────────────────────────────────
  let dashboardLoaded = false;
  
  function switchTab(tab) {
    ['attendance', 'lateness', 'dashboard'].forEach(t => {
      document.getElementById('panel-' + t).classList.toggle('d-none', t !== tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });

    if (tab === 'dashboard' && !dashboardLoaded) {
      loadDashboard();
      dashboardLoaded = true;
    }
  }

  // ─── File Handling (Tab Attendance) ──────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    // Attendance Zone
    const zoneAtt = document.getElementById('uploadZone-att');
    const inputAtt = document.getElementById('fileInput-att');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
      zoneAtt.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }, false);
    });
    ['dragenter', 'dragover'].forEach(ev => zoneAtt.addEventListener(ev, () => zoneAtt.classList.add('dragover'), false));
    ['dragleave', 'drop'].forEach(ev => zoneAtt.addEventListener(ev, () => zoneAtt.classList.remove('dragover'), false));

    zoneAtt.addEventListener('drop', e => {
      if (e.dataTransfer.files.length > 0) addAttendanceFiles(e.dataTransfer.files);
    }, false);
    inputAtt.addEventListener('change', e => {
      if (e.target.files.length > 0) addAttendanceFiles(e.target.files);
    }, false);

    // Lateness Zone đã được gỡ bỏ (chỉ dùng nút bấm trực tiếp)
  });

  // --- Attendance ---
  function addAttendanceFiles(files) {
    const allowed = /(\.xlsx|\.xlsm|\.xls)$/i;
    let added = false;
    for (let i = 0; i < files.length; i++) {
      if (allowed.test(files[i].name)) {
        if (!attendanceFiles.find(f => f.name === files[i].name)) {
          attendanceFiles.push(files[i]);
          added = true;
        }
      }
    }
    if (added) renderAttendanceFiles();
  }

  function removeAttendanceFile(index) {
    attendanceFiles.splice(index, 1);
    renderAttendanceFiles();
  }

  function clearAttendanceFiles() {
    attendanceFiles = [];
    renderAttendanceFiles();
  }

  function renderAttendanceFiles() {
    const listEl = document.getElementById('fileList-att');
    const btn = document.getElementById('btn-att');

    if (attendanceFiles.length === 0) {
      listEl.classList.add('d-none');
      btn.disabled = true;
      document.getElementById('fileInput-att').value = '';
      return;
    }

    listEl.classList.remove('d-none');
    btn.disabled = false;

    let html = `
      <div class="file-list-header">
        <span>Đã chọn ${attendanceFiles.length} file</span>
        <span class="file-list-clear" onclick="clearAttendanceFiles()">Xóa tất cả</span>
      </div>
    `;

    attendanceFiles.forEach((file, idx) => {
      html += `
        <div class="file-list-item">
          <div class="file-list-name">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5z"/></svg>
            ${file.name}
            <span class="file-list-size">(${formatBytes(file.size)})</span>
          </div>
          <div class="file-list-remove" onclick="removeAttendanceFile(${idx})">×</div>
        </div>
      `;
    });

    listEl.innerHTML = html;
    hideResult('att');
  }

  // --- Lateness (Multi-file) logic đã được gỡ bỏ ---

  // ─── Run Attendance ───────────────────────────────────────────────────────
  async function runAttendanceUI() {
    if (attendanceFiles.length === 0) return;

    setRunning('att', true);

    try {
      // 1. Dọn dẹp Import Folder cũ
      updateProgress('att', 10, 'Đang làm sạch thư mục Import cũ...');
      await runGoogleScript('clearImportFolder');

      // 2. Upload tuần tự từng file
      for (let i = 0; i < attendanceFiles.length; i++) {
        const file = attendanceFiles[i];
        const pct = 10 + Math.round((i / attendanceFiles.length) * 40); // Tới max 50%
        updateProgress('att', pct, `Đang upload (${i + 1}/${attendanceFiles.length}): ${file.name}...`);

        const base64 = await readFileAsBase64(file);
        await runGoogleScript('uploadFileToImportFolder', file.name, base64);
      }

      // 3. Chạy pipeline xử lý
      updateProgress('att', 60, 'Đang xử lý Chấm Công (có thể mất 3-5 phút)...');
      const res = await runGoogleScript('runAttendanceWeb');

      updateProgress('att', 100, 'Hoàn thành!');
      clearAttendanceFiles();
      setRunning('att', false);

      let links = '';
      if (res.congFileUrl) links += linkHtml(res.congFileUrl, 'Mở file Bảng Công mới nhất');
      if (res.archiveCongFolderUrl) links += linkHtml(res.archiveCongFolderUrl, 'Thư mục Archive Bảng Công');
      if (res.archiveFolderUrl) links += linkHtml(res.archiveFolderUrl, 'Thư mục Archive Chấm Công');

      showResult('att', true, 'Xử lý Chấm Công thành công!', links);

    } catch (err) {
      onFailure('att', err);
    }
  }

  // ─── Run Lateness ─────────────────────────────────────────────────────────
  async function runLatenessUI() {
    setRunning('lat', true);

    try {
      updateProgress('lat', 50, 'Đang quét thư mục và Tính toán Tổng Hợp Đi Trễ / Về Sớm...');
      const res = await runGoogleScript('runLatenessWeb');

      // Xong
      updateProgress('lat', 100, 'Hoàn thành!');
      setRunning('lat', false);

      let links = '';
      if (res.latenessSheetUrl) links += linkHtml(res.latenessSheetUrl, 'Mở Sheet Lateness (HRM Database)');
      if (res.archiveFileUrl) links += linkHtml(res.archiveFileUrl, 'Mở file Tổng hợp mới nhất');
      if (res.archiveFolderUrl) links += linkHtml(res.archiveFolderUrl, 'Thư mục Archiver Tổng hợp');

      showResult('lat', true, 'Tính Đi Trễ / Về Sớm thành công! (' + (res.totalRows || 0) + ' dòng)', links);

    } catch (err) {
      onFailure('lat', err);
    }
  }

  // ─── Run Dashboard ────────────────────────────────────────────────────────
  let chartDept = null;
  let chartDonut = null;

  async function loadDashboard() {
    const loader = document.getElementById('dashboard-loader');
    const content = document.getElementById('dashboard-content');
    
    loader.classList.remove('d-none');
    content.classList.add('d-none');

    try {
      const res = await runGoogleScript('getDashboardData');
      
      if (res.error) {
        alert(res.error);
        loader.classList.add('d-none');
        return;
      }
      
      const empData = res.employees;
      const deptData = res.departments;
      
      if (empData.length === 0 && deptData.length === 0) {
        alert("Chưa có dữ liệu. Vui lòng chạy tính năng 'Tổng Hợp Đi Trễ' trước.");
        loader.classList.add('d-none');
        return;
      }

      // Calculate KPIs
      const totalEmp = empData.length;
      let totalCong = 0;
      let totalLateCount = 0;
      let totalLateMin = 0;
      
      empData.forEach(e => {
        totalCong += Number(e.totalCong) || 0;
        totalLateCount += Number(e.lateCount) || 0;
        totalLateMin += Number(e.lateMinutes) || 0;
      });
      
      document.getElementById('kpi-emp').textContent = totalEmp.toLocaleString();
      document.getElementById('kpi-cong').textContent = totalCong.toLocaleString();
      document.getElementById('kpi-late-count').textContent = totalLateCount.toLocaleString();
      document.getElementById('kpi-late-min').textContent = totalLateMin.toLocaleString();
      
      // Dept Chart Data (Top 5)
      const topDepts = [...deptData].sort((a,b) => b.totalLateCount - a.totalLateCount).slice(0, 5);
      const deptNames = topDepts.map(d => d.department || 'Khác');
      const deptLates = topDepts.map(d => d.totalLateCount);
      
      if (chartDept) chartDept.destroy();
      const optionsDept = {
        series: [{ name: 'Lượt trễ', data: deptLates }],
        chart: { type: 'bar', height: 300, toolbar: { show: false } },
        plotOptions: { bar: { horizontal: true, borderRadius: 4, dataLabels: { position: 'top' } } },
        colors: ['#f59e0b'],
        dataLabels: { enabled: true, offsetX: -6, style: { fontSize: '12px', colors: ['#fff'] } },
        xaxis: { categories: deptNames }
      };
      chartDept = new ApexCharts(document.querySelector("#chart-dept-late"), optionsDept);
      chartDept.render();
      
      // Donut Chart
      if (chartDonut) chartDonut.destroy();
      const optionsDonut = {
        series: [totalCong, totalLateCount],
        labels: ['Ngày đúng giờ', 'Ngày đi trễ'],
        chart: { type: 'donut', height: 300 },
        colors: ['#10b981', '#f59e0b'],
        dataLabels: { enabled: false },
        plotOptions: { pie: { donut: { size: '65%' } } }
      };
      chartDonut = new ApexCharts(document.querySelector("#chart-donut"), optionsDonut);
      chartDonut.render();
      
      // Table Data
      const topEmps = [...empData].sort((a,b) => b.lateMinutes - a.lateMinutes).slice(0, 10);
      let tbody = '';
      topEmps.forEach(e => {
        if(Number(e.lateMinutes) === 0) return;
        tbody += `<tr>
          <td>${e.employeeId}</td>
          <td><strong>${e.employeeName}</strong></td>
          <td>${e.department}</td>
          <td class="text-center">${e.lateCount}</td>
          <td class="text-center text-danger fw-bold">${e.lateMinutes}</td>
        </tr>`;
      });
      document.getElementById('table-late-emp').innerHTML = tbody || '<tr><td colspan="5" class="text-center">Không có dữ liệu đi trễ</td></tr>';
      
      loader.classList.add('d-none');
      content.classList.remove('d-none');
      
    } catch (err) {
      alert("Lỗi tải Dashboard: " + (err.message || err.toString()));
      loader.classList.add('d-none');
    }
  }

  // ─── Shared Helpers ───────────────────────────────────────────────────────
  function onFailure(id, err) {
    showResult(id, false, err.message || err.toString());
    setRunning(id, false);
  }

  function setRunning(id, running) {
    const btn = document.getElementById('btn-' + id);
    btn.disabled = running;
    document.getElementById('status-' + id).style.display = running ? 'block' : 'none';
    if (!running) updateProgress(id, 0, '');
  }

  function updateProgress(id, pct, text) {
    document.getElementById('progress-' + id).style.width = pct + '%';
    document.getElementById('statusText-' + id).textContent = text;
  }

  function showResult(id, success, title, links) {
    const box = document.getElementById('result-' + id);
    box.style.display = 'block';
    box.className = 'result-box ' + (success ? 'result-success' : 'result-error');
    document.getElementById('resultTitle-' + id).innerHTML = (success ? '✅ ' : '❌ ') + title;
    document.getElementById('resultLinks-' + id).innerHTML = links || '';
  }

  function hideResult(id) {
    document.getElementById('result-' + id).style.display = 'none';
  }

  function linkHtml(url, label) {
    return `<a href="${url}" target="_blank" class="result-link-item">${label}</a>`;
  }
</script>
