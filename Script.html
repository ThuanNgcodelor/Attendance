<script>
  // ─── State ───────────────────────────────────────────────────────────────
  let selectedFile = null;

  // ─── Tab Switching ────────────────────────────────────────────────────────
  function switchTab(tab) {
    ['attendance', 'lateness'].forEach(t => {
      document.getElementById('panel-' + t).classList.toggle('d-none', t !== tab);
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
  }

  // ─── File Handling (Tab Attendance) ──────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    const zone  = document.getElementById('uploadZone-att');
    const input = document.getElementById('fileInput-att');

    ['dragenter','dragover','dragleave','drop'].forEach(ev =>
      zone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }, false)
    );
    ['dragenter','dragover'].forEach(ev =>
      zone.addEventListener(ev, () => zone.classList.add('dragover'), false)
    );
    ['dragleave','drop'].forEach(ev =>
      zone.addEventListener(ev, () => zone.classList.remove('dragover'), false)
    );

    zone.addEventListener('drop', e => {
      const files = e.dataTransfer.files;
      if (files.length > 0) setFile(files[0]);
    }, false);

    input.addEventListener('change', e => {
      if (e.target.files.length > 0) setFile(e.target.files[0]);
    }, false);
  });

  function setFile(file) {
    if (!/(\\.xlsx|\\.xlsm|\\.xls)$/i.test(file.name)) {
      showResult('att', false, 'Chỉ hỗ trợ file Excel (.xlsx, .xlsm, .xls)');
      return;
    }
    selectedFile = file;
    document.getElementById('fileName-att').textContent = file.name;
    document.getElementById('fileBadge-att').classList.remove('d-none');
    document.getElementById('btn-att').disabled = false;
    hideResult('att');
  }

  function removeFile(id) {
    selectedFile = null;
    document.getElementById('fileInput-att').value = '';
    document.getElementById('fileBadge-att').classList.add('d-none');
    document.getElementById('btn-att').disabled = true;
  }

  // ─── Run Attendance ───────────────────────────────────────────────────────
  function runAttendanceUI() {
    if (!selectedFile) return;

    setRunning('att', true);
    updateProgress('att', 15, 'Đang đọc file...');

    const reader = new FileReader();
    reader.onload = function (e) {
      const base64 = e.target.result.split(',')[1];
      updateProgress('att', 40, 'Đang tải file lên Import Folder...');

      google.script.run
        .withSuccessHandler(res => onAttendanceSuccess(res))
        .withFailureHandler(err => onFailure('att', err))
        .uploadAndProcessFile(selectedFile.name, base64);
    };
    reader.onerror = () => { showResult('att', false, 'Lỗi đọc file.'); setRunning('att', false); };
    reader.readAsDataURL(selectedFile);
  }

  function onAttendanceSuccess(res) {
    updateProgress('att', 100, 'Hoàn thành!');
    removeFile('att');
    setRunning('att', false);

    let links = '';
    if (res.congFileUrl)
      links += linkHtml(res.congFileUrl, '📊 Mở file Bảng Công mới nhất');
    if (res.archiveCongFolderUrl)
      links += linkHtml(res.archiveCongFolderUrl, '📁 Thư mục Archive Bảng Công');
    if (res.archiveFolderUrl)
      links += linkHtml(res.archiveFolderUrl, '📁 Thư mục Archive Chấm Công');

    showResult('att', true, 'Xử lý Chấm Công thành công!', links);
  }

  // ─── Run Lateness ─────────────────────────────────────────────────────────
  function runLatenessUI() {
    setRunning('lat', true);
    updateProgress('lat', 20, 'Đang đọc file từ Lateness Folder...');

    google.script.run
      .withSuccessHandler(res => onLatenessSuccess(res))
      .withFailureHandler(err => onFailure('lat', err))
      .runLatenessWeb();
  }

  function onLatenessSuccess(res) {
    updateProgress('lat', 100, 'Hoàn thành!');
    setRunning('lat', false);

    let links = '';
    if (res.latenessSheetUrl)
      links += linkHtml(res.latenessSheetUrl, '📋 Mở Sheet Lateness (HRM Database)');
    if (res.archiveFileUrl)
      links += linkHtml(res.archiveFileUrl, '📊 Mở file Tổng hợp mới nhất');
    if (res.archiveFolderUrl)
      links += linkHtml(res.archiveFolderUrl, '📁 Thư mục Archiver Tổng hợp');

    showResult('lat', true,
      'Tính Đi Trễ / Về Sớm thành công! (' + (res.totalRows || 0) + ' dòng)',
      links
    );
  }

  // ─── Shared Helpers ───────────────────────────────────────────────────────
  function onFailure(id, err) {
    showResult(id, false, err.message || err.toString());
    setRunning(id, false);
  }

  function setRunning(id, running) {
    const btn = document.getElementById('btn-' + id);
    btn.disabled = running;
    document.getElementById('status-' + id).style.display = running ? 'block' : 'none';
    if (!running) updateProgress(id, 0, '');
  }

  function updateProgress(id, pct, text) {
    document.getElementById('progress-' + id).style.width = pct + '%';
    document.getElementById('statusText-' + id).textContent = text;
  }

  function showResult(id, success, title, links) {
    const box = document.getElementById('result-' + id);
    box.style.display = 'block';
    box.className = 'result-box ' + (success ? 'result-success' : 'result-error');
    document.getElementById('resultTitle-' + id).innerHTML =
      (success ? '✅ ' : '❌ ') + title;
    document.getElementById('resultLinks-' + id).innerHTML = links || '';
  }

  function hideResult(id) {
    document.getElementById('result-' + id).style.display = 'none';
  }

  function linkHtml(url, label) {
    return `<a href="${url}" target="_blank" class="result-link-item">${label}</a>`;
  }
</script>
